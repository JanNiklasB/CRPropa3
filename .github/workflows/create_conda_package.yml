name: create_conda_package
on:
  push:
    branches: [master, condaWorkflowTests]
  label:
    types: [created, edited]


jobs:
  linux:
    if: github.repository=='JanNiklasB/CRPropa3'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Preinstall
        run: |
          ldd --version
          conda init
          conda update -n base conda -y
          conda install conda-build -y
          conda upload -h
      - name: Build Conda Package
        run: |
          conda init
          cd conda-bld
          conda build -m conda_build_config.yaml -c conda-forge .
