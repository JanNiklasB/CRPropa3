  arm:
    if: github.repository=='JanNiklasB/CRPropa3'
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Miniconda
        run: |
          set -ex
          ldd --version
          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-aarch64.sh &> /dev/null
          sh Miniconda3-latest-Linux-aarch64.sh -b
      - name: Install Additional Conda Packages
        run: |
          set -ex
          conda init
          conda update -n base conda -y &> /dev/null
          conda install conda-build anaconda-client -y &> /dev/null
      - name: Build Conda Package
        env:
          accountName: ${{ secrets.ANACONDA_ACCOUNTNAME }}
          token: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          set -ex
          conda init &> /dev/null
          cd conda-bld
          conda config --set anaconda_upload yes 
          conda build -m conda_build_config.yaml -c conda-forge . \
            --user $accountName \
            --token $token \
            | tee build.log
      - name: Archive Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "Anaconda_Build_Log"
          path: conda-bld/build.log